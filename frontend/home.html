<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket — Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container-xl main-content">

    <!-- Barra de busca -->
    <div class="card-generico p-3 mb-4">
      <form id="form-busca" class="d-flex gap-2">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search text-primary"></i></span>
          <input type="search" id="busca-input" class="form-control form-control-lg border-start-0 ps-0"
                 placeholder="Buscar por título ou descrição...">
        </div>
        <button type="submit" class="btn btn-primary px-4 fw-semibold">Buscar</button>
      </form>
    </div>

    <div class="row g-4">
      <!-- Sidebar de filtros -->
      <div class="col-lg-3">
        <button class="btn btn-outline-primary w-100 mb-3 d-lg-none"
                type="button" data-bs-toggle="collapse" data-bs-target="#filtros-panel">
          <i class="bi bi-funnel me-2"></i>Filtros
        </button>

        <div class="collapse d-lg-block" id="filtros-panel">
          <div class="filtros-card p-0">
            <div class="card-header px-3 py-2">
              <i class="bi bi-funnel me-2"></i>FILTROS
            </div>
            <div class="p-3">

              <!-- Categoria -->
              <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-muted">Categoria</label>
                <select id="filtro-categoria" class="form-select">
                  <option value="">Todas as categorias</option>
                </select>
              </div>

              <!-- Curso -->
              <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-muted">Curso</label>
                <div class="input-group input-group-sm">
                  <input type="text" id="filtro-curso" class="form-control"
                         placeholder="Ex: Direito">
                  <button class="btn btn-outline-secondary" type="button" id="btn-buscar-curso">
                    <i class="bi bi-arrow-right"></i>
                  </button>
                </div>
              </div>

              <!-- Faixa de preço -->
              <div class="mb-3">
                <label class="form-label fw-semibold small text-uppercase text-muted">Faixa de Preço</label>
                <div class="row g-2">
                  <div class="col-6">
                    <input type="number" id="preco-min" class="form-control form-control-sm"
                           placeholder="R$ Min" min="0" step="0.01">
                  </div>
                  <div class="col-6">
                    <input type="number" id="preco-max" class="form-control form-control-sm"
                           placeholder="R$ Max" min="0" step="0.01">
                  </div>
                </div>
                <button class="btn btn-sm btn-outline-primary w-100 mt-2" id="btn-aplicar-preco">
                  Aplicar preço
                </button>
              </div>

              <hr class="my-3">
              <button class="btn btn-sm btn-light w-100" id="btn-limpar-filtros">
                <i class="bi bi-x-circle me-1"></i>Limpar filtros
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Grade de anúncios -->
      <div class="col-lg-9">
        <div class="page-header">
          <h1 class="section-title">Anúncios</h1>
          <span id="total-anuncios" class="badge bg-primary-subtle text-primary fs-6 px-3 py-2">…</span>
        </div>
        <div id="alert-container"></div>
        <div class="row g-3" id="anuncios-grid">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
