<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket — Criar Conta</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page" style="align-items: flex-start; padding: 1.5rem;">

  <div class="auth-card card p-4 p-md-5 my-3">
    <div class="text-center mb-4">
      <div class="auth-logo mb-1">
        <i class="bi bi-shop-window me-2"></i>UniMarket
      </div>
      <p class="text-muted mb-0">Crie sua conta gratuita</p>
    </div>

    <div id="alert-container"></div>

    <form id="form-cadastro" novalidate>
      <div class="mb-3">
        <label for="nome" class="form-label fw-semibold">Nome completo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label for="senha" class="form-label fw-semibold">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="col-6">
          <label for="confirma-senha" class="form-label fw-semibold">Confirmar senha</label>
          <input type="password" id="confirma-senha" class="form-control" placeholder="Repita a senha" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="curso" class="form-label fw-semibold">Curso</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-mortarboard"></i></span>
          <input type="text" id="curso" class="form-control" placeholder="Ex: Engenharia de Software" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="telefone" class="form-label fw-semibold">WhatsApp <small class="text-muted">(com DDD)</small></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-whatsapp"></i></span>
          <input type="tel" id="telefone" class="form-control" placeholder="11999999999" required>
        </div>
        <div class="form-text">Seu número será usado para contato pelos compradores.</div>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primary btn-lg w-100 fw-bold">
        Criar conta
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center mb-0 text-muted">
      Já tem conta?
      <a href="/login.html" class="text-primary fw-semibold text-decoration-none">Fazer login</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cadastro.js"></script>
</body>
</html>
