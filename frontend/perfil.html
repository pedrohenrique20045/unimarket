<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket — Meu Perfil</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container main-content">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="page-header mb-4">
          <h1 class="section-title"><i class="bi bi-person-circle me-2 text-primary"></i>Meu Perfil</h1>
        </div>

        <div id="alert-container"></div>

        <div class="card-generico p-4">
          <!-- Foto de perfil -->
          <div class="text-center mb-4">
            <div class="position-relative d-inline-block">
              <img id="foto-perfil" src="" class="perfil-avatar" alt="Foto de perfil">
              <label for="input-foto" class="position-absolute bottom-0 end-0 btn btn-primary btn-sm rounded-circle p-1"
                     style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer"
                     title="Alterar foto">
                <i class="bi bi-camera-fill small"></i>
              </label>
              <input type="file" id="input-foto" accept=".jpg,.jpeg,.png,.webp" hidden>
            </div>
            <p class="text-muted small mt-2 mb-0">Clique no ícone para alterar a foto</p>
          </div>

          <form id="form-perfil" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <div class="form-control bg-light text-muted" id="campo-email" style="min-height:38px;padding:0.375rem 0.75rem;">
                —
              </div>
              <div class="form-text">O email não pode ser alterado.</div>
            </div>

            <div class="mb-3">
              <label for="campo-nome" class="form-label fw-semibold">Nome completo <span class="text-danger">*</span></label>
              <input type="text" id="campo-nome" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="campo-curso" class="form-label fw-semibold">Curso <span class="text-danger">*</span></label>
              <input type="text" id="campo-curso" class="form-control" required>
            </div>

            <div class="mb-4">
              <label for="campo-telefone" class="form-label fw-semibold">WhatsApp <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-whatsapp text-success"></i></span>
                <input type="tel" id="campo-telefone" class="form-control" required
                       placeholder="11999999999">
              </div>
            </div>

            <button type="submit" id="btn-salvar" class="btn btn-primary fw-bold px-5">
              <i class="bi bi-check-lg me-2"></i>Salvar alterações
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/perfil.js"></script>
</body>
</html>
