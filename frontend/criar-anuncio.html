<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket - Criar Anúncio</title>
  <link rel="icon" type="image/png" href="/img/logo-unifan.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container main-content">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="page-header mb-4">
          <h1 class="section-title"><i class="bi bi-plus-circle me-2 text-primary"></i>Criar Anúncio</h1>
        </div>

        <div id="alert-container"></div>

        <div class="card-generico p-4">
          <form id="form-criar" novalidate>

            <div class="mb-3">
              <label for="titulo" class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
              <input type="text" id="titulo" class="form-control" required
                     placeholder="Ex: Livro Cálculo I – Stewart 7ª edição" maxlength="120">
              <div class="form-text">Seja específico para facilitar a busca</div>
            </div>

            <div class="mb-3">
              <label for="descricao" class="form-label fw-semibold">Descrição <span class="text-danger">*</span></label>
              <textarea id="descricao" class="form-control" rows="4" required
                        placeholder="Descreva o estado do item, edição, anotações, defeitos..."></textarea>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label for="preco" class="form-label fw-semibold">Preço (R$) <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" id="preco" class="form-control" required
                         placeholder="0,00" min="0" step="0.01">
                </div>
              </div>
              <div class="col-sm-6">
                <label for="estado_conservacao" class="form-label fw-semibold">Estado de conservação <span class="text-danger">*</span></label>
                <select id="estado_conservacao" class="form-select" required>
                  <option value="">Selecione...</option>
                  <option value="Novo">Novo</option>
                  <option value="Seminovo">Seminovo</option>
                  <option value="Usado">Usado</option>
                </select>
              </div>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-sm-6">
                <label for="categoria" class="form-label fw-semibold">Categoria <span class="text-danger">*</span></label>
                <select id="categoria" class="form-select" required>
                  <option value="">Selecione...</option>
                </select>
              </div>
              <div class="col-sm-6">
                <label for="curso_relacionado" class="form-label fw-semibold">Curso relacionado</label>
                <input type="text" id="curso_relacionado" class="form-control"
                       placeholder="Ex: Engenharia Civil (opcional)">
              </div>
            </div>

            <!-- Upload de fotos -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                Fotos <span class="text-danger">*</span>
                <span class="text-muted fw-normal">— até 5 imagens, máximo 5 MB cada</span>
              </label>
              <div class="upload-area" id="upload-area">
                <i class="bi bi-cloud-arrow-up"></i>
                <p class="mb-1 fw-semibold">Clique ou arraste as fotos aqui</p>
                <small class="text-muted">JPG, PNG ou WEBP</small>
              </div>
              <input type="file" id="fotos-input" accept=".jpg,.jpeg,.png,.webp" multiple hidden>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <div class="foto-preview-container" id="fotos-preview"></div>
                <small class="text-muted flex-shrink-0 ms-2" id="fotos-contador">0/5 fotos</small>
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" id="btn-submit" class="btn btn-primary btn-lg px-5 fw-bold">
                <i class="bi bi-send me-2"></i>Publicar anúncio
              </button>
              <a href="/home.html" class="btn btn-light btn-lg px-4">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="unifan-footer">
    <p>© 2026 UniMarket - Projeto acadêmico desenvolvido por Pedro Henrique Silvano de Morais</p>
    <p>Centro Universitário Alfredo Nasser - Engenharia de Software</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/criar-anuncio.js"></script>
</body>
</html>
