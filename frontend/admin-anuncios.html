<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket - Gerenciar Anúncios</title>
  <link rel="icon" type="image/png" href="/img/logo-unifan.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container-xl main-content">

    <div class="page-header mb-3">
      <div>
        <h1 class="section-title"><i class="bi bi-collection-fill me-2" style="color:var(--um-secondary)"></i>Gerenciar Anúncios</h1>
        <a href="/admin.html" class="text-muted small text-decoration-none">
          <i class="bi bi-arrow-left me-1"></i>Voltar ao Dashboard
        </a>
      </div>
      <span class="badge bg-primary fs-6 fw-normal" id="anuncio-count"></span>
    </div>

    <!-- Filtros por status -->
    <div class="card-generico p-3 mb-3 d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-primary active" data-status="todos">
        <i class="bi bi-grid me-1"></i>Todos
      </button>
      <button class="btn btn-sm btn-outline-primary" data-status="ativo">
        <i class="bi bi-check-circle me-1"></i>Ativos
      </button>
      <button class="btn btn-sm btn-outline-primary" data-status="vendido">
        <i class="bi bi-bag-check me-1"></i>Vendidos
      </button>
    </div>

    <div id="alert-container"></div>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 text-muted">Carregando anúncios...</p>
    </div>

    <div class="card-generico p-0 d-none" id="tabela-container">
      <div class="table-responsive">
        <table class="table table-hover mb-0 admin-table">
          <thead class="table-light">
            <tr>
              <th class="px-3 text-muted fw-semibold" style="width:50px">ID</th>
              <th style="width:56px"></th>
              <th>Título</th>
              <th class="d-none d-md-table-cell">Categoria</th>
              <th style="width:100px">Preço</th>
              <th class="d-none d-lg-table-cell">Vendedor</th>
              <th style="width:90px">Status</th>
              <th class="d-none d-md-table-cell" style="width:100px">Data</th>
              <th class="text-center" style="width:100px">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-body"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="unifan-footer">
    <p>© 2026 UniMarket - Projeto acadêmico desenvolvido por Pedro Henrique Silvano de Morais</p>
    <p>Centro Universitário Alfredo Nasser - Engenharia de Software</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin-anuncios.js"></script>
</body>
</html>
