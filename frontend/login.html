<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMarket — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card card p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="auth-logo mb-1">
        <i class="bi bi-shop-window me-2"></i>UniMarket
      </div>
      <p class="text-muted mb-0">Marketplace universitário</p>
    </div>

    <div id="alert-container"></div>

    <form id="form-login" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control form-control-lg"
                 placeholder="seu@email.com" required autocomplete="email">
        </div>
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="senha" class="form-control form-control-lg"
                 placeholder="Sua senha" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="toggle-senha" tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primary btn-lg w-100 fw-bold">
        Entrar
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center mb-0 text-muted">
      Ainda não tem conta?
      <a href="/cadastro.html" class="text-primary fw-semibold text-decoration-none">Criar conta</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
